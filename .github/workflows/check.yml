name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache-dependency-path: go/go.sum
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false
      - name: Verify Go formatting and vet
        run: |
          test -z "$(gofmt -l go/cmd go/internal)"
          cd go
          go vet ./...
      - name: Prove archived runtime is not executable
        run: |
          make archive-tripwire dist/iw
          intercept="$RUNNER_TEMP/archived-runtime-tripwire"
          mkdir -p "$intercept"
          printf '#!/bin/sh\nexit 99\n' > "$intercept/node"
          printf '#!/bin/sh\nexit 99\n' > "$intercept/npm"
          chmod +x "$intercept/node" "$intercept/npm"
          PATH="$intercept:$PATH" make check check-root-catalog
      - name: Prove archive tripwire is portable and covers workflow docs
        run: |
          export_root="$RUNNER_TEMP/infrawright-export"
          mkdir -p "$export_root"
          git archive HEAD | tar -x -C "$export_root"
          make -C "$export_root" archive-tripwire
          printf '\nEach Virtual Service Edge node must be registered.\n' >> \
            "$export_root/packs/_shared/zscaler/demo/README.md"
          make -C "$export_root" archive-tripwire
          printf '\nnode deleted-runtime.mjs\n' >> \
            "$export_root/tools/source-evidence-ast/README.md"
          if make -C "$export_root" archive-tripwire; then
            echo "archive-tripwire did not reject a documented Node command" >&2
            exit 1
          fi
      - name: Whitespace hygiene
        run: git diff --check

  pack-profiles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [empty, aws, cloudflare, google, netbox, zcc, zia, zpa, ztc, zscaler, full]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache-dependency-path: go/go.sum
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false
      - name: Materialize selected pack root
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          profile="$GITHUB_WORKSPACE/packs/$PROFILE.packset.json"
          root="$RUNNER_TEMP/packs-$PROFILE"
          mkdir -p "$root"
          while IFS= read -r pack; do
            cp -R "$GITHUB_WORKSPACE/packs/$pack" "$root/$pack"
          done < <(jq -r '.packs[]' "$profile")
          while IFS= read -r shared; do
            mkdir -p "$root/_shared"
            cp -R "$GITHUB_WORKSPACE/packs/_shared/$shared" "$root/_shared/$shared"
          done < <(jq -r '.shared[]' "$profile")
          echo "INFRAWRIGHT_PACKS=$root" >> "$GITHUB_ENV"
          echo "PACK_PROFILE=$profile" >> "$GITHUB_ENV"
      - name: Validate reduced distribution and profile derivability
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          make check-distribution
          cd go
          go test -count=1 ./internal/metadata \
            -run "^TestAllCommittedPackProfilesLoadFromReducedRoots/${PROFILE}$|^TestCommittedPackProfilesAreDerivable/${PROFILE}$"
