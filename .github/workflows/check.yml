name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  runtime-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false
      - name: Install pinned build dependencies
        run: npm ci --ignore-scripts
      - name: Complete Node gate
        run: npm run check:all
      - name: Build supported CLI bundle
        run: npm run build
      - name: Prove generic runtime release staging
        run: node scripts/test-runtime-release.mjs
      - name: Whitespace hygiene
        run: git diff --check

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned Node dependencies
        run: npm ci --ignore-scripts
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false
      - name: Full gate
        run: make check
      - name: Whitespace hygiene
        run: git diff --check

  pack-profiles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [empty, aws, cloudflare, google, netbox, zcc, zia, zpa, ztc, zscaler]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned Node dependencies
        run: npm ci --ignore-scripts
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false
      - name: Materialize selected pack root
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          root="$RUNNER_TEMP/packs-$PROFILE"
          node scripts/materialize-pack-profile.mjs copy \
            --profile "packsets/$PROFILE.json" \
            --packs-root packs \
            --destination "$root"
          echo "INFRAWRIGHT_PACKS=$root" >> "$GITHUB_ENV"
          echo "PACK_PROFILE=$GITHUB_WORKSPACE/packsets/$PROFILE.json" >> "$GITHUB_ENV"
      - name: Selected distribution gate
        run: make check
  pruned-checkouts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [empty, zscaler]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false
      - name: Build checkout without omitted packs
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          root="$RUNNER_TEMP/pruned-$PROFILE"
          git worktree add --detach "$root" HEAD
          node "$root/scripts/materialize-pack-profile.mjs" prune \
            --profile "$root/packsets/$PROFILE.json" \
            --packs-root "$root/packs"
          echo "PRUNED_ROOT=$root" >> "$GITHUB_ENV"
      - name: Pruned distribution gate
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          npm --prefix "$PRUNED_ROOT" ci --ignore-scripts
          make -C "$PRUNED_ROOT" PACK_PROFILE="packsets/$PROFILE.json" check
