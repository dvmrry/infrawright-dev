name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node-process-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: hashicorp/setup-terraform@v3
        with:
          # Module generation formats HCL through `terraform fmt -`, which needs stdin.
          terraform_wrapper: false
      - name: Install pinned build dependencies
        run: npm ci --ignore-scripts
      - name: Type, unit, and Python differential checks
        run: npm run check:all
      - name: Build no-install process bundle
        run: npm run build
      - name: Prove generic runtime release staging without tags or runtime installs
        run: node scripts/test-runtime-release.mjs
      - name: Prove bundle runs outside the checkout
        run: |
          root="$RUNNER_TEMP/infrawright-node-smoke"
          mkdir -p "$root"
          cp dist/infrawright.mjs dist/infrawright-zcc-collector-child.mjs "$root/"
          collect_workspace="$root/collect-workspace"
          mkdir -p "$collect_workspace"
          python3 - "$collect_workspace" > "$root/collect-request.json" <<'PY'
          import json
          import os
          import sys

          workspace = os.path.realpath(sys.argv[1])
          json.dump({
              "kind": "infrawright.process_request",
              "schema_version": 1,
              "request_id": "ci-relocated-collection-smoke",
              "operation": "collect_zcc_pull",
              "context": {
                  "workspace": workspace,
                  "deployment": "unused.json",
                  "root_catalog": "unused.json",
              },
              "input": {
                  "mode": "oneapi",
                  "publication": "replace_or_verify_exact",
                  "tenant": "ci",
                  "resource_type": "zcc_web_privacy",
              },
          }, sys.stdout)
          PY
          set +e
          (cd "$root" && \
            env -i LANG=C LC_ALL=C TZ=UTC \
            INFRAWRIGHT_ZCC_PULL_OUTPUT_ROOT="$(realpath "$collect_workspace")" \
            "$(command -v node)" infrawright.mjs \
            < collect-request.json > collect-response.json)
          collect_exit=$?
          set -e
          test "$collect_exit" = 1
          python3 - "$root/collect-response.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              response = json.load(f)
          assert response["status"] == "error", response
          assert response["error"]["code"] == "ZCC_ONEAPI_HOST_CONFIGURATION_INVALID", response
          assert not (response["error"]["retryable"]), response
          PY
          python3 - "$GITHUB_WORKSPACE" > "$root/request.json" <<'PY'
          import json
          import sys

          workspace = sys.argv[1]
          json.dump({
              "kind": "infrawright.process_request",
              "schema_version": 1,
              "request_id": "ci-bundle-smoke",
              "operation": "roots",
              "context": {
                  "workspace": workspace,
                  "deployment": "missing-deployment.json",
                  "root_catalog": "catalogs/zscaler-root-catalog.v1.json",
              },
              "input": {
                  "tenant": None,
                  "selectors": ["zpa/application_segment"],
              },
          }, sys.stdout)
          PY
          (cd "$root" && node infrawright.mjs < request.json > response.json)
          python3 - "$root/response.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              response = json.load(f)
          assert response["status"] == "ok", response
          assert response["result"]["kind"] == "infrawright.root_topology"
          PY
          python3 - "$GITHUB_WORKSPACE" > "$root/request.json" <<'PY'
          import json
          import sys

          workspace = sys.argv[1]
          json.dump({
              "kind": "infrawright.process_request",
              "schema_version": 1,
              "request_id": "ci-scope-smoke",
              "operation": "scope_paths",
              "context": {
                  "workspace": workspace,
                  "deployment": "missing-deployment.json",
                  "root_catalog": "catalogs/zscaler-root-catalog.v1.json",
              },
              "input": {
                  "paths": [
                      "config/prod/zpa_application_segment.auto.tfvars.json",
                  ],
              },
          }, sys.stdout)
          PY
          (cd "$root" && node infrawright.mjs < request.json > response.json)
          python3 - "$root/response.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              response = json.load(f)
          assert response["status"] == "ok", response
          assert response["result"]["kind"] == "infrawright.changed_path_scope"
          assert response["result"]["affected_resources"] == [
              "zpa_application_segment",
          ]
          PY
          mkdir -p "$root/artifacts/envs/prod/zpa_application_segment"
          touch "$root/artifacts/envs/prod/zpa_application_segment/tfplan"
          touch "$root/artifacts/envs/prod/zpa_application_segment/tfplan.sources"
          python3 - "$GITHUB_WORKSPACE" "$root" > "$root/request.json" <<'PY'
          import json
          import os
          import sys

          workspace, root = sys.argv[1:]
          deployment = os.path.join(root, "deployment.json")
          with open(deployment, "w", encoding="utf-8") as f:
              json.dump({"overlay": os.path.join(root, "artifacts")}, f)
          json.dump({
              "kind": "infrawright.process_request",
              "schema_version": 1,
              "request_id": "ci-plan-roots-smoke",
              "operation": "plan_roots",
              "context": {
                  "workspace": workspace,
                  "deployment": deployment,
                  "root_catalog": "catalogs/zscaler-root-catalog.v1.json",
              },
              "input": {
                  "tenant": "prod",
                  "selectors": ["zpa/application_segment"],
              },
          }, sys.stdout)
          PY
          (cd "$root" && node infrawright.mjs < request.json > response.json)
          python3 - "$root/response.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              response = json.load(f)
          assert response["status"] == "ok", response
          assert response["result"]["kind"] == "infrawright.plan_roots"
          assert len(response["result"]["roots"]) == 1
          assert response["result"]["roots"][0]["artifact_state"] == "complete"
          PY
          bootstrap="$root/bootstrap-workspace"
          mkdir -p "$bootstrap/pulls/prod"
          cp "$GITHUB_WORKSPACE/catalogs/zscaler-root-catalog.v1.json" \
            "$bootstrap/zscaler-root-catalog.v1.json"
          printf '%s\n' '[{"id":"1"}]' \
            > "$bootstrap/pulls/prod/zcc_failopen_policy.json"
          python3 - "$bootstrap" > "$root/request.json" <<'PY'
          import json
          import os
          import sys

          workspace = sys.argv[1]
          with open(os.path.join(workspace, "deployment.json"), "w", encoding="utf-8") as f:
              json.dump({"overlay": "artifacts"}, f)
          json.dump({
              "kind": "infrawright.process_request",
              "schema_version": 1,
              "request_id": "ci-zcc-bootstrap-smoke",
              "operation": "compile_pull_artifacts",
              "context": {
                  "workspace": workspace,
                  "deployment": "deployment.json",
                  "root_catalog": "zscaler-root-catalog.v1.json",
              },
              "input": {
                  "mode": "bootstrap",
                  "tenant": "prod",
                  "resource_type": "zcc_failopen_policy",
              },
          }, sys.stdout)
          PY
          (cd "$root" && node infrawright.mjs < request.json > response.json)
          python3 - "$root/response.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              response = json.load(f)
          assert response["status"] == "ok", response
          assert response["operation"] == "compile_pull_artifacts", response
          assert response["result"]["kind"] == "infrawright.zcc_pull_artifact_set"
          assert response["result"]["status"] == "ready"
          assert response["result"]["artifacts"]["tfvars"]["content"] == (
              '{\n  "items": {\n    "1": {}\n  }\n}\n'
          )
          PY
          python3 - "$GITHUB_WORKSPACE" "$root" <<'PY'
          import json
          import os
          import stat
          import sys

          from engine import ops

          workspace, root = sys.argv[1:]
          resource_type = "zpa_application_segment"
          overlay = os.path.join(root, "artifacts")
          env_dir = os.path.join(
              overlay, "envs", "prod", resource_type)
          module_dir = os.path.join(overlay, "modules", resource_type)
          config_dir = os.path.join(overlay, "config", "prod")
          os.makedirs(env_dir, exist_ok=True)
          os.makedirs(module_dir, exist_ok=True)
          os.makedirs(config_dir, exist_ok=True)
          with open(os.path.join(module_dir, "main.tf"), "w", encoding="utf-8") as f:
              f.write("# module\n")
          with open(os.path.join(env_dir, "main.tf"), "w", encoding="utf-8") as f:
              f.write(
                  'module "%s" {\n'
                  '  source = "../../../modules/%s"\n'
                  '  items = var.%s_items\n'
                  '}\n' % (resource_type, resource_type, resource_type)
              )
          var_file = os.path.join(
              config_dir, resource_type + ".auto.tfvars.json")
          with open(var_file, "w", encoding="utf-8") as f:
              f.write("{}\n")
          with open(os.path.join(env_dir, "tfplan"), "wb") as f:
              f.write(b"opaque plan bytes\n")
          ops._write_plan_fingerprint(
              env_dir, [var_file], [resource_type])
          terraform = os.path.join(root, "terraform-fake")
          plan = json.dumps({
              "format_version": "1.2",
              "terraform_version": "1.15.4",
              "complete": True,
              "errored": False,
              "resource_changes": [{
                  "address": resource_type + '.this["one"]',
                  "type": resource_type,
                  "change": {
                      "actions": ["no-op"],
                      "before": {"status": "same"},
                      "after": {"status": "same"},
                  },
              }],
              "output_changes": {},
          }, separators=(",", ":"))
          with open(terraform, "w", encoding="utf-8") as f:
              f.write("#!/bin/sh\nprintf '%s' '%s'\n" % (
                  "%s", plan.replace("'", "'\\''")))
          os.chmod(terraform, stat.S_IRUSR | stat.S_IWUSR | stat.S_IXUSR)
          with open(os.path.join(root, "assessment-request.json"), "w", encoding="utf-8") as f:
              json.dump({
                  "kind": "infrawright.process_request",
                  "schema_version": 1,
                  "request_id": "ci-assessment-smoke",
                  "operation": "assess_saved_plans",
                  "context": {
                      "workspace": workspace,
                      "deployment": os.path.join(root, "deployment.json"),
                      "root_catalog": "catalogs/zscaler-root-catalog.v1.json",
                  },
                  "input": {
                      "mode": "assert-clean",
                      "tenant": "prod",
                      "selectors": ["zpa/application_segment"],
                      "backend_config": None,
                      "policy": None,
                  },
              }, f)
          PY
          (cd "$root" && \
            INFRAWRIGHT_TERRAFORM_EXECUTABLE="$root/terraform-fake" \
            node infrawright.mjs < assessment-request.json > assessment-response.json)
          python3 - "$root/assessment-response.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              response = json.load(f)
          assert response["status"] == "ok", response
          assert response["operation"] == "assess_saved_plans", response
          assert response["result"]["kind"] == "infrawright.saved_plan_assessment"
          assert response["result"]["summary"]["status"] == "clean"
          assert response["result"]["roots"][0]["guidance"] == []
          PY
      - name: Whitespace hygiene
        run: git diff --check

  node-materializer-posix:
    name: Node materializer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned build dependencies
        run: npm ci --ignore-scripts
      - name: Build focused materializer tests
        run: npm run build:test
      - name: Exercise retry-forward publication and public parity
        run: >-
          node --test
          .node-test/node-tests/zcc-pull-materializer.test.js
          .node-test/node-tests/zcc-pull-materializer-process.test.js
          .node-test/node-tests/zcc-pull-materialization-semantics.test.js

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned Node dependencies
        run: npm ci --ignore-scripts
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Full gate
        run: make check
      - name: Whitespace hygiene
        run: git diff --check

  floor:
    # The engine documents a Python 3.6 floor; 3.6 runners are gone, so pin
    # the oldest interpreter GitHub still hosts as the enforced floor and
    # keep syntax honest (no f-strings, no walrus, no 3.7+-only kwargs).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.7"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned Node dependencies
        run: npm ci --ignore-scripts
      - name: Unit tests on floor interpreter
        run: make test-python-legacy

  pack-profiles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [empty, aws, cloudflare, google, netbox, zcc, zia, zpa, ztc, zscaler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned Node dependencies
        run: npm ci --ignore-scripts
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Materialize selected pack root
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          root="$RUNNER_TEMP/packs-$PROFILE"
          mkdir -p "$root"
          python3 - "$PROFILE" "$root" <<'PY'
          import json
          import os
          import shutil
          import sys

          profile_name, output_root = sys.argv[1:]
          with open("packsets/%s.json" % profile_name, encoding="utf-8") as f:
              profile = json.load(f)
          for name in profile["packs"]:
              shutil.copytree(
                  os.path.join("packs", name),
                  os.path.join(output_root, name),
              )
          if profile["shared"]:
              shared_root = os.path.join(output_root, "_shared")
              os.makedirs(shared_root)
              for name in profile["shared"]:
                  shutil.copytree(
                      os.path.join("packs", "_shared", name),
                      os.path.join(shared_root, name),
                  )
          PY
          echo "INFRAWRIGHT_PACKS=$root" >> "$GITHUB_ENV"
          echo "PACK_PROFILE=$GITHUB_WORKSPACE/packsets/$PROFILE.json" >> "$GITHUB_ENV"
      - name: Selected distribution gate
        run: make check
      - name: Selected legacy Python compatibility gate
        run: make test-python-legacy

  pruned-checkouts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [empty, zscaler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Build checkout without omitted packs
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          root="$RUNNER_TEMP/pruned-$PROFILE"
          git worktree add --detach "$root" HEAD
          python3 - "$PROFILE" "$root" <<'PY'
          import json
          import os
          import shutil
          import sys

          profile_name, checkout = sys.argv[1:]
          with open(
                  os.path.join(checkout, "packsets", profile_name + ".json"),
                  encoding="utf-8") as f:
              profile = json.load(f)

          packs_root = os.path.join(checkout, "packs")
          selected_packs = set(profile["packs"])
          for name in os.listdir(packs_root):
              path = os.path.join(packs_root, name)
              if (name != "_shared" and os.path.isdir(path)
                      and name not in selected_packs):
                  shutil.rmtree(path)

          shared_root = os.path.join(packs_root, "_shared")
          selected_shared = set(profile["shared"])
          if os.path.isdir(shared_root):
              for name in os.listdir(shared_root):
                  path = os.path.join(shared_root, name)
                  if os.path.isdir(path) and name not in selected_shared:
                      shutil.rmtree(path)
              if not selected_shared:
                  shutil.rmtree(shared_root)
          PY
          echo "PRUNED_ROOT=$root" >> "$GITHUB_ENV"
      - name: Pruned distribution gate
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          npm --prefix "$PRUNED_ROOT" ci --ignore-scripts
          make -C "$PRUNED_ROOT" PACK_PROFILE="packsets/$PROFILE.json" check
      - name: Pruned legacy Python compatibility gate
        env:
          PROFILE: ${{ matrix.profile }}
        run: >-
          make -C "$PRUNED_ROOT"
          PACK_PROFILE="packsets/$PROFILE.json"
          test-python-legacy
